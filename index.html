<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StreamFind">
<meta name="theme-color" content="#0a0a0f">
<title>StreamFind</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --s1: #13131a;
  --s2: #1c1c27;
  --bd: rgba(255,255,255,0.07);
  --acc: #e8ff47;
  --pur: #7b6fff;
  --tx: #f0f0f5;
  --mu: #6b6b80;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--tx); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; top: -30%; left: -20%; width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(123,111,255,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 18px; display: flex; flex-direction: column; min-height: 100dvh; }
header { padding-top: calc(var(--safe-top) + 12px); padding-bottom: 20px; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
.logo span { color: var(--acc); }
.logo-sub { font-size: 11px; color: var(--mu); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

.search-wrap { position: relative; margin-bottom: 10px; }
input[type=text] {
  width: 100%; background: var(--s1); border: 1px solid var(--bd);
  border-radius: 14px; padding: 15px 50px 15px 16px;
  font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--tx);
  outline: none; -webkit-appearance: none; transition: border-color 0.2s;
}
input[type=text]::placeholder { color: var(--mu); }
input[type=text]:focus { border-color: rgba(123,111,255,0.5); background: var(--s2); }
.go {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 9px; background: var(--acc);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, opacity 0.15s;
}
.go:active { transform: translateY(-50%) scale(0.9); opacity: 0.8; }
.go svg { width: 15px; height: 15px; }

.filters { display: flex; gap: 7px; margin-bottom: 20px; }
.fb {
  flex: 1; padding: 9px; border-radius: 10px; border: 1px solid var(--bd);
  background: var(--s1); color: var(--mu); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: center;
}
.fb.on { background: var(--pur); border-color: var(--pur); color: #fff; font-weight: 500; }

#out { flex: 1; }

.msg { font-size: 14px; color: var(--mu); text-align: center; padding: 3rem 0; }
.sp {
  display: inline-block; width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--acc);
  animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.card {
  background: var(--s1); border: 1px solid var(--bd); border-radius: 18px;
  overflow: hidden; margin-bottom: 10px;
  animation: up 0.3s ease both;
}
@keyframes up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }

.ctop { display: flex; gap: 12px; padding: 14px; align-items: flex-start; }
.poster { width: 58px; height: 86px; border-radius: 9px; object-fit: cover; background: var(--s2); flex-shrink: 0; border: 1px solid var(--bd); }
.poster-ph { width: 58px; height: 86px; border-radius: 9px; background: var(--s2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid var(--bd); }
.cinfo { flex: 1; min-width: 0; }
.ctitle { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.2; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmeta { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
.bdg { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 5px; }
.bdg.movie { color: var(--acc); background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); }
.bdg.tv { color: var(--pur); background: rgba(123,111,255,0.1); border: 1px solid rgba(123,111,255,0.25); }
.yr { font-size: 12px; color: var(--mu); }
.rating { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: var(--acc); background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); border-radius: 5px; padding: 2px 6px; }
.rating-imdb { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #f5c518; background: rgba(245,197,24,0.08); border: 1px solid rgba(245,197,24,0.25); border-radius: 5px; padding: 2px 6px; }
.rating-rt { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #fa320a; background: rgba(250,50,10,0.08); border: 1px solid rgba(250,50,10,0.25); border-radius: 5px; padding: 2px 6px; }
.ov { font-size: 12px; color: var(--mu); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.prov { border-top: 1px solid var(--bd); padding: 12px 14px; }
.pload { font-size: 12px; color: var(--mu); display: flex; align-items: center; gap: 6px; }
.msp { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.1); border-top-color: var(--pur); animation: spin 0.7s linear infinite; flex-shrink: 0; }

.pgrp { margin-bottom: 10px; }
.pgrp:last-of-type { margin-bottom: 4px; }
.plbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--mu); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.g { background: #4ade80; }
.dot.y { background: #facc15; }
.dot.p { background: var(--pur); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: flex; align-items: center; gap: 5px; background: var(--s2); border: 1px solid var(--bd); border-radius: 7px; padding: 4px 9px 4px 4px; font-size: 12px; color: var(--tx); }
.plogo { width: 22px; height: 22px; border-radius: 5px; object-fit: cover; }
.nonefound { font-size: 13px; color: var(--mu); font-style: italic; }
.jw-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 9px; font-size: 11px; color: var(--mu); text-decoration: none; border: 1px solid var(--bd); border-radius: 6px; padding: 3px 8px; }

footer { padding: 16px 0 calc(var(--safe-bot) + 8px); text-align: center; font-size: 11px; color: var(--mu); }
footer a { color: var(--mu); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Stream<span>Find</span></div>
    <div class="logo-sub">Where to watch anything</div>
  </header>

  <div class="search-wrap">
    <input type="text" id="q" placeholder="Search movies &amp; TV shows…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="go" id="go" aria-label="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>

  <div class="filters">
    <button class="fb on" data-t="all">All</button>
    <button class="fb" data-t="movie">Movies</button>
    <button class="fb" data-t="tv">TV Shows</button>
  </div>

  <div id="out"><div class="msg">Search for a movie or TV show</div></div>

  <footer>Data from <a href="https://www.themoviedb.org" target="_blank">TMDB</a> · Streaming info by JustWatch</footer>
</div>

<script>
const K = '6c27741b50b704ef8489173aa786c956';
const BASE = 'https://api.themoviedb.org/3';
const IB = 'https://image.tmdb.org/t/p/w154';
const LB = 'https://image.tmdb.org/t/p/w45';
const OMDB_KEY = '777a3eb6';
let ftype = 'all', lastQ = '';

const qi = document.getElementById('q');
const out = document.getElementById('out');

document.querySelectorAll('.fb').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    ftype = b.dataset.t;
    if (lastQ) go(lastQ);
  });
});

document.getElementById('go').addEventListener('click', run);
qi.addEventListener('keydown', e => { if (e.key === 'Enter') { qi.blur(); run(); } });

function run() { const v = qi.value.trim(); if (v) go(v); }

async function searchTMDB(q) {
  const r = await fetch(`${BASE}/search/multi?api_key=${K}&query=${encodeURIComponent(q)}&language=en-US&page=1&include_adult=false`);
  if (!r.ok) throw new Error(`API returned ${r.status}`);
  const d = await r.json();
  let res = (d.results || []).filter(x => x.media_type === 'movie' || x.media_type === 'tv');
  if (ftype !== 'all') res = res.filter(x => x.media_type === ftype);
  return res;
}

async function go(q) {
  lastQ = q;
  out.innerHTML = '<div class="msg"><span class="sp"></span>Searching…</div>';
  try {
    let res = await searchTMDB(q);
    if (!res.length) {
      const words = q.split(/\s+/).filter(w => w.length >= 3);
      if (words.length > 1) {
        const perWord = await Promise.all(words.map(w => searchTMDB(w)));
        const counts = {};
        perWord.flat().forEach(x => counts[x.id] = (counts[x.id] || 0) + 1);
        const seen = new Set();
        res = perWord.flat().filter(x => { if (seen.has(x.id)) return false; seen.add(x.id); return true; });
        res.sort((a, b) => counts[b.id] - counts[a.id]);
      }
    }
    res = res.slice(0, 5);
    if (!res.length) { out.innerHTML = `<div class="msg">No results for "${esc(q)}"</div>`; return; }
    out.innerHTML = '';
    res.forEach(item => {
      const card = mkCard(item);
      out.appendChild(card);
      loadP(item, card.querySelector('.prov'));
      loadRatings(item, card);
    });
  } catch(e) {
    out.innerHTML = `<div class="msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function mkCard(item) {
  const isM = item.media_type === 'movie';
  const title = esc(isM ? item.title : item.name);
  const year = ((isM ? item.release_date : item.first_air_date) || '').slice(0, 4);
  const ov = esc(item.overview || '');
  const tmdbRating = item.vote_average && item.vote_average > 0
    ? `<span class="rating"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${item.vote_average.toFixed(1)}</span>`
    : '';
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<div class="ctop">
    ${item.poster_path
      ? `<img class="poster" src="${IB}${item.poster_path}" alt="${title}" loading="lazy">`
      : `<div class="poster-ph">${isM ? '🎬' : '📺'}</div>`}
    <div class="cinfo">
      <div class="ctitle">${title}</div>
      <div class="cmeta">
        <span class="bdg ${item.media_type}">${isM ? 'Movie' : 'TV'}</span>
        ${year ? `<span class="yr">${year}</span>` : ''}
        ${tmdbRating}
      </div>
      ${ov ? `<div class="ov">${ov}</div>` : ''}
    </div>
  </div>
  <div class="prov"><div class="pload"><span class="msp"></span>Checking streaming…</div></div>`;
  return div;
}

async function loadP(item, section) {
  try {
    const type = item.media_type === 'movie' ? 'movie' : 'tv';
    const r = await fetch(`${BASE}/${type}/${item.id}/watch/providers?api_key=${K}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    renderP(section, (d.results || {}).US, item);
  } catch(e) {
    section.innerHTML = `<div class="nonefound">Could not load streaming info</div>`;
  }
}

async function loadRatings(item, card) {
  if (!OMDB_KEY || OMDB_KEY === 'your_omdb_api_key_here') return;
  console.log('Loading ratings for', item.title || item.name);
  try {
    const type = item.media_type === 'movie' ? 'movie' : 'tv';
    const extRes = await fetch(`${BASE}/${type}/${item.id}/external_ids?api_key=${K}`);
    if (!extRes.ok) {
      console.log('External IDs fetch failed:', extRes.status);
      return;
    }
    const ext = await extRes.json();
    const imdbId = ext.imdb_id;
    console.log('IMDB ID:', imdbId);
    if (!imdbId) return;
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_KEY}`);
    if (!omdbRes.ok) {
      console.log('OMDB fetch failed:', omdbRes.status);
      return;
    }
    const omdb = await omdbRes.json();
    console.log('OMDB response:', omdb);
    const imdbRating = omdb.imdbRating;
    const rtRating = omdb.Ratings?.find(r => r.Source === 'Rotten Tomatoes')?.Value;
    const cmeta = card.querySelector('.cmeta');
    if (imdbRating && imdbRating !== 'N/A') cmeta.insertAdjacentHTML('beforeend', `<span class="rating-imdb">IMDb ${imdbRating}</span>`);
    if (rtRating) cmeta.insertAdjacentHTML('beforeend', `<span class="rating-rt">🍅 ${rtRating}</span>`);
  } catch(e) {
    console.log('Error loading ratings:', e);
  }
}

function renderP(section, us, item) {
  if (!us) { section.innerHTML = `<div class="nonefound">Not available for streaming in the US</div>`; return; }
  const groups = [
    { key: 'flatrate', label: 'Included with subscription', dot: 'g' },
    { key: 'free',     label: 'Free with ads',              dot: 'g' },
    { key: 'rent',     label: 'Rent',                       dot: 'y' },
    { key: 'buy',      label: 'Buy',                        dot: 'p' },
  ];
  let html = ''; let any = false;
  const title = item.title || item.name;
  groups.forEach(g => {
    const ps = us[g.key]; if (!ps || !ps.length) return; any = true;
    html += `<div class="pgrp"><div class="plbl"><span class="dot ${g.dot}"></span>${g.label}</div>
      <div class="chips">${ps.map(p =>
        `<div class="chip">${p.logo_path ? `<img class="plogo" src="${LB}${p.logo_path}" alt="${esc(p.provider_name)}" loading="lazy">` : ''}${esc(p.provider_name)}</div>`
      ).join('')}</div></div>`;
  });
  if (!any) html = `<div class="nonefound">No streaming options in the US</div>`;
  const link = us.link || `https://www.themoviedb.org/${item.media_type}/${item.id}/watch?locale=US`;
  html += `<a class="jw-link" href="${link}" target="_blank">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    View on TMDB</a>`;
  section.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
