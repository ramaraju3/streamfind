<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StreamFind">
<meta name="theme-color" content="#060b18">
<title>StreamFind</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060b18;
  --card: #0c1225;
  --card2: #111a32;
  --bd: rgba(255,255,255,0.08);
  --primary: #00d4d6;
  --tx: #eef2f7;
  --mu: #7085a0;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--tx); font-family: 'Inter', sans-serif; overflow-x: hidden; }

/* Navbar */
.navbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,11,24,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--bd);
  padding-top: var(--safe-top);
}
.navbar-inner { display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 56px; }
.logo {
  font-weight: 800; font-size: 17px; color: var(--primary);
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap; text-decoration: none; letter-spacing: -0.3px;
}
.search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.search-wrap .sico { position: absolute; left: 11px; pointer-events: none; color: var(--mu); transition: color 0.2s; }
.search-wrap:focus-within .sico { color: var(--primary); }
input[type=text] {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid transparent;
  border-radius: 999px; padding: 8px 38px 8px 34px;
  font-size: 14px; font-family: 'Inter', sans-serif; color: var(--tx);
  outline: none; -webkit-appearance: none; transition: all 0.2s;
}
input[type=text]::placeholder { color: var(--mu); }
input[type=text]:focus {
  background: rgba(255,255,255,0.09); border-color: rgba(0,212,214,0.4);
  box-shadow: 0 0 0 3px rgba(0,212,214,0.1);
}
.go {
  position: absolute; right: 4px; width: 30px; height: 30px; border-radius: 999px;
  background: var(--primary); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s;
}
.go:active { transform: scale(0.9); opacity: 0.8; }

.filters { display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.fb {
  flex-shrink: 0; display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 999px; border: 1px solid var(--bd);
  background: transparent; color: var(--mu); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.fb.on { background: rgba(0,212,214,0.1); border-color: rgba(0,212,214,0.3); color: var(--primary); }

/* Main */
main { padding: 16px; max-width: 720px; margin: 0 auto; padding-bottom: calc(var(--safe-bot) + 24px); }

/* States */
.msg { font-size: 14px; color: var(--mu); text-align: center; padding: 4rem 0; }
.sp {
  display: inline-block; width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--primary);
  animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Results header */
.results-hd { margin-bottom: 14px; animation: up 0.2s ease both; }
.results-hd h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.results-hd p { font-size: 12px; color: var(--mu); margin-top: 2px; }
.results-hd p span { color: var(--tx); font-weight: 500; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; animation: up 0.3s ease both; }

/* Title card */
.title-card {
  display: flex; flex-direction: column; gap: 6px; cursor: pointer;
  padding: 5px; border-radius: 14px; transition: background 0.15s; position: relative;
}
.title-card:active { background: rgba(255,255,255,0.04); }
.poster-wrap {
  position: relative; border-radius: 10px; overflow: hidden;
  aspect-ratio: 2/3; background: var(--card); border: 1px solid var(--bd);
}
.poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
.title-card:active .poster-wrap img { transform: scale(1.03); }
.poster-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--mu); }
.rbadge {
  position: absolute; top: 6px; right: 6px; background: rgba(6,11,24,0.88);
  backdrop-filter: blur(8px); border: 1px solid rgba(0,212,214,0.3); border-radius: 6px;
  padding: 2px 5px; font-size: 9px; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; gap: 2px; line-height: 1.4;
}
.card-info { padding: 0 2px; }
.card-title { font-size: 11.5px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
.card-year { font-size: 10px; color: var(--mu); }
.card-type { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 1px 5px; border-radius: 4px; }
.card-type.movie { color: var(--primary); background: rgba(0,212,214,0.1); }
.card-type.tv { color: #a78bfa; background: rgba(167,139,250,0.1); }

/* Detail view */
.detail { animation: up 0.25s ease both; }
.back-btn {
  display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--mu);
  font-weight: 500; background: none; border: none; cursor: pointer;
  padding: 0; margin-bottom: 18px; font-family: 'Inter', sans-serif; transition: color 0.15s;
}
.back-btn:active { color: var(--tx); }
.detail-hero { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
.detail-poster { width: 90px; height: 135px; border-radius: 12px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--bd); }
.detail-poster-ph { width: 90px; height: 135px; border-radius: 12px; background: var(--card); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 1px solid var(--bd); }
.detail-info { flex: 1; min-width: 0; }
.detail-title { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.25; margin-bottom: 7px; }
.detail-tags { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; flex-wrap: wrap; }
.detail-ratings { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
.detail-ov { font-size: 12px; color: var(--mu); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 4; line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

/* Detail sections */
.dsec { background: var(--card); border: 1px solid var(--bd); border-radius: 16px; padding: 13px 14px; margin-bottom: 10px; }
.dsec-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mu); font-weight: 600; margin-bottom: 10px; }

/* Streaming */
.pgrp { margin-bottom: 10px; }
.pgrp:last-of-type { margin-bottom: 0; }
.plbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--mu); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.g { background: #4ade80; }
.dot.y { background: #facc15; }
.dot.p { background: #a78bfa; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--bd); border-radius: 7px; padding: 4px 9px 4px 4px; font-size: 12px; color: var(--tx); }
.plogo { width: 22px; height: 22px; border-radius: 5px; object-fit: cover; }
.nonefound { font-size: 13px; color: var(--mu); font-style: italic; }
.msp { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.1); border-top-color: var(--primary); animation: spin 0.7s linear infinite; flex-shrink: 0; }
.pload { font-size: 12px; color: var(--mu); display: flex; align-items: center; gap: 6px; }

/* Ratings */
.rating { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: var(--primary); background: rgba(0,212,214,0.08); border: 1px solid rgba(0,212,214,0.2); border-radius: 5px; padding: 2px 6px; }
.rating-imdb { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #f5c518; background: rgba(245,197,24,0.08); border: 1px solid rgba(245,197,24,0.25); border-radius: 5px; padding: 2px 6px; }
.rating-rt { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #fa320a; background: rgba(250,50,10,0.08); border: 1px solid rgba(250,50,10,0.25); border-radius: 5px; padding: 2px 6px; }
.bdg { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 5px; }
.bdg.movie { color: var(--primary); background: rgba(0,212,214,0.08); border: 1px solid rgba(0,212,214,0.2); }
.bdg.tv { color: #a78bfa; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25); }
.yr { font-size: 12px; color: var(--mu); }

/* Book / Music / Fashion sections */
.book-sec .xsec, .music-sec .xsec, .fashion-sec .xsec {
  background: var(--card); border: 1px solid var(--bd); border-radius: 16px; padding: 13px 14px; margin-bottom: 10px;
}
.xsec-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--mu); margin-bottom: 8px; }
.book-row { display: flex; gap: 10px; align-items: flex-start; }
.book-thumb { width: 36px; height: 54px; border-radius: 5px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--bd); background: var(--card2); }
.book-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
.book-author { font-size: 11px; color: var(--mu); margin-bottom: 6px; }
.album-row { display: flex; gap: 10px; align-items: center; margin-bottom: 4px; }
.album-art { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; flex-shrink: 0; }
.album-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
.album-artist { font-size: 11px; color: var(--mu); margin-bottom: 4px; }
.song-list { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.song-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; min-width: 0; }
.song-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-artist { font-size: 11px; color: var(--mu); flex-shrink: 0; }
.xlink { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 11px; color: var(--primary); text-decoration: none; }
.fashion-links { display: flex; gap: 8px; }
.fashion-btn { flex: 1; text-align: center; padding: 8px; border-radius: 9px; background: rgba(255,255,255,0.04); border: 1px solid var(--bd); font-size: 12px; font-weight: 500; color: var(--tx); text-decoration: none; transition: background 0.15s; }
.fashion-btn:active { background: rgba(255,255,255,0.08); }

footer { padding: 16px; padding-bottom: calc(var(--safe-bot) + 16px); text-align: center; font-size: 11px; color: var(--mu); }
footer a { color: var(--mu); }
</style>
</head>
<body>

<header class="navbar">
  <div class="navbar-inner">
    <a class="logo" href="#">🍿 StreamFind</a>
    <div class="search-wrap">
      <svg class="sico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="Movies, shows…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="go" id="go" aria-label="Search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#060b18" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
  <div class="filters">
    <button class="fb on" data-t="all">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      All
    </button>
    <button class="fb" data-t="movie">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      Movies
    </button>
    <button class="fb" data-t="tv">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      TV Shows
    </button>
  </div>
</header>

<main>
  <div id="out"><div class="msg">Search for a movie or TV show</div></div>
</main>

<footer>Data from <a href="https://www.themoviedb.org" target="_blank">TMDB</a> · Streaming by JustWatch</footer>

<script>
const K = '6c27741b50b704ef8489173aa786c956';
const BASE = 'https://api.themoviedb.org/3';
const IB = 'https://image.tmdb.org/t/p/w342';
const LB = 'https://image.tmdb.org/t/p/w45';
const OMDB_KEY = '777a3eb6';
const TUNEFIND_USER = 'your_tunefind_user';
const TUNEFIND_PASS = 'your_tunefind_pass';
let ftype = 'all', lastQ = '', lastResults = [];

const qi = document.getElementById('q');
const out = document.getElementById('out');

document.querySelectorAll('.fb').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    ftype = b.dataset.t;
    if (lastQ) go(lastQ);
  });
});

document.getElementById('go').addEventListener('click', run);
qi.addEventListener('keydown', e => { if (e.key === 'Enter') { qi.blur(); run(); } });
function run() { const v = qi.value.trim(); if (v) go(v); }

const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) { qi.value = urlQ; go(urlQ); }

async function searchTMDB(q) {
  const r = await fetch(`${BASE}/search/multi?api_key=${K}&query=${encodeURIComponent(q)}&language=en-US&page=1&include_adult=false`);
  if (!r.ok) throw new Error(`API returned ${r.status}`);
  const d = await r.json();
  let res = (d.results || []).filter(x => x.media_type === 'movie' || x.media_type === 'tv');
  if (ftype !== 'all') res = res.filter(x => x.media_type === ftype);
  return res;
}

function buildFallbackQueries(q) {
  const words = q.split(/\s+/).filter(w => w.length >= 3);
  const queries = new Set();
  words.forEach(w => queries.add(w));
  words.forEach((word, wi) => {
    for (let i = 0; i < word.length - 1; i++) {
      const fixed = word.slice(0, i) + word[i + 1] + word[i] + word.slice(i + 2);
      if (fixed !== word) { const nw = [...words]; nw[wi] = fixed; queries.add(nw.join(' ')); }
    }
  });
  return [...queries].slice(0, 10);
}

async function go(q) {
  lastQ = q;
  out.innerHTML = '<div class="msg"><span class="sp"></span>Searching…</div>';
  try {
    let res = await searchTMDB(q);
    if (!res.length) {
      const fallbacks = buildFallbackQueries(q);
      if (fallbacks.length) {
        const allResults = await Promise.all(fallbacks.map(fq => searchTMDB(fq)));
        const counts = {};
        allResults.flat().forEach(x => counts[x.id] = (counts[x.id] || 0) + 1);
        const seen = new Set();
        res = allResults.flat()
          .filter(x => { if (seen.has(x.id)) return false; seen.add(x.id); return true; })
          .sort((a, b) => counts[b.id] - counts[a.id] || (b.vote_count || 0) - (a.vote_count || 0));
      }
    }
    res = res.slice(0, 12);
    if (!res.length) { out.innerHTML = `<div class="msg">No results for "${esc(q)}"</div>`; return; }
    lastResults = res;
    renderGrid(res, q);
  } catch(e) {
    out.innerHTML = `<div class="msg">⚠️ ${esc(e.message)}</div>`;
  }
}

function renderGrid(res, q) {
  out.innerHTML = `
    <div class="results-hd">
      <h2>Search Results</h2>
      <p>Showing results for <span>"${esc(q)}"</span></p>
    </div>
    <div class="grid">${res.map(item => mkCard(item)).join('')}</div>
  `;
  out.querySelectorAll('.title-card').forEach((el, i) => {
    el.addEventListener('click', () => showDetail(res[i]));
  });
}

function mkCard(item) {
  const isM = item.media_type === 'movie';
  const title = esc(isM ? item.title : item.name);
  const year = ((isM ? item.release_date : item.first_air_date) || '').slice(0, 4);
  const rating = item.vote_average && item.vote_average > 0
    ? `<div class="rbadge"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${item.vote_average.toFixed(1)}</div>`
    : '';
  return `<div class="title-card">
    <div class="poster-wrap">
      ${item.poster_path ? `<img src="${IB}${item.poster_path}" alt="${title}" loading="lazy">` : `<div class="poster-ph">${isM ? '🎬' : '📺'}</div>`}
      ${rating}
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-foot">
        <span class="card-year">${year}</span>
        <span class="card-type ${item.media_type}">${isM ? 'Movie' : 'TV'}</span>
      </div>
    </div>
  </div>`;
}

function showDetail(item) {
  const isM = item.media_type === 'movie';
  const title = esc(isM ? item.title : item.name);
  const year = ((isM ? item.release_date : item.first_air_date) || '').slice(0, 4);
  const ov = esc(item.overview || '');
  const tmdbRating = item.vote_average && item.vote_average > 0
    ? `<span class="rating"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>TMDB ${item.vote_average.toFixed(1)}</span>`
    : '';
  const detail = document.createElement('div');
  detail.className = 'detail';
  detail.innerHTML = `
    <button class="back-btn" id="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Back to results
    </button>
    <div class="detail-hero">
      ${item.poster_path
        ? `<img class="detail-poster" src="${IB}${item.poster_path}" alt="${title}">`
        : `<div class="detail-poster-ph">${isM ? '🎬' : '📺'}</div>`}
      <div class="detail-info">
        <div class="detail-title">${title}</div>
        <div class="detail-tags">
          <span class="bdg ${item.media_type}">${isM ? 'Movie' : 'TV'}</span>
          ${year ? `<span class="yr">${year}</span>` : ''}
        </div>
        <div class="detail-ratings">
          <span class="imdb-slot"></span>
          ${tmdbRating}
          <span class="rt-slot"></span>
        </div>
        ${ov ? `<div class="detail-ov">${ov}</div>` : ''}
      </div>
    </div>
    <div class="dsec">
      <div class="dsec-lbl">📺 Where to Watch</div>
      <div class="prov"><div class="pload"><span class="msp"></span>Checking streaming…</div></div>
    </div>
    <div class="book-sec"></div>
    <div class="music-sec"></div>
    <div class="fashion-sec"></div>
  `;
  out.innerHTML = '';
  out.appendChild(detail);
  window.scrollTo(0, 0);
  detail.querySelector('#back-btn').addEventListener('click', () => {
    renderGrid(lastResults, lastQ);
    window.scrollTo(0, 0);
  });
  loadP(item, detail.querySelector('.prov'));
  loadRatings(item, detail);
  loadBook(item, detail);
  loadMusic(item, detail);
  loadFashion(item, detail);
}

async function loadP(item, section) {
  try {
    const type = item.media_type === 'movie' ? 'movie' : 'tv';
    const r = await fetch(`${BASE}/${type}/${item.id}/watch/providers?api_key=${K}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    renderP(section, (d.results || {}).US, item);
  } catch(e) {
    section.innerHTML = `<div class="nonefound">Could not load streaming info</div>`;
  }
}

async function loadRatings(item, card) {
  const type = item.media_type === 'movie' ? 'movie' : 'tv';
  try {
    const extRes = await fetch(`${BASE}/${type}/${item.id}/external_ids?api_key=${K}`);
    if (!extRes.ok) return;
    const ext = await extRes.json();
    if (!ext.imdb_id) return;
    const res = await fetch(`https://www.omdbapi.com/?i=${ext.imdb_id}&apikey=${OMDB_KEY}`);
    if (!res.ok) return;
    const d = await res.json();
    const imdbRating = d.imdbRating && d.imdbRating !== 'N/A' ? d.imdbRating : null;
    const rtScore = d.Ratings?.find(r => r.Source === 'Rotten Tomatoes')?.Value;
    const imdbSlot = card.querySelector('.imdb-slot');
    const rtSlot = card.querySelector('.rt-slot');
    if (imdbRating) { imdbSlot.className = 'rating-imdb'; imdbSlot.textContent = `IMDb ${imdbRating}`; }
    if (rtScore) { rtSlot.className = 'rating-rt'; rtSlot.innerHTML = `🍅 ${rtScore}`; }
  } catch(e) {}
}

function toSlug(title) {
  return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

async function loadBook(item, card) {
  const title = item.title || item.name;
  try {
    const r = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=5&fields=title,author_name,cover_i,key`);
    if (!r.ok) return;
    const d = await r.json();
    const match = (d.docs || []).find(b => b.title?.toLowerCase() === title.toLowerCase());
    if (!match) return;
    const cover = match.cover_i ? `https://covers.openlibrary.org/b/id/${match.cover_i}-M.jpg` : null;
    const author = (match.author_name || [])[0] || '';
    const url = `https://openlibrary.org${match.key}`;
    card.querySelector('.book-sec').innerHTML = `<div class="xsec">
      <div class="xsec-lbl">📚 Based on the book</div>
      <div class="book-row">
        ${cover ? `<img class="book-thumb" src="${cover}" loading="lazy">` : ''}
        <div>
          <div class="book-title">${esc(match.title)}</div>
          ${author ? `<div class="book-author">by ${esc(author)}</div>` : ''}
          <a class="xlink" href="${url}" target="_blank">Read on Open Library →</a>
        </div>
      </div>
    </div>`;
  } catch(e) {}
}

async function loadMusic(item, card) {
  const title = item.title || item.name;
  const slug = toSlug(title);
  const type = item.media_type === 'movie' ? 'movie' : 'show';
  let albumHtml = '', songsHtml = '';
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title + ' soundtrack')}&media=music&entity=album&limit=5`);
    if (r.ok) {
      const d = await r.json();
      const album = (d.results || []).find(a => /soundtrack|original score|original motion picture/i.test(a.collectionName));
      if (album) {
        const art = album.artworkUrl100.replace('100x100bb', '160x160bb');
        albumHtml = `<div class="album-row">
          <img class="album-art" src="${art}" loading="lazy">
          <div>
            <div class="album-name">${esc(album.collectionName)}</div>
            <div class="album-artist">${esc(album.artistName)}</div>
            <a class="xlink" href="${album.collectionViewUrl}" target="_blank">Listen on Apple Music →</a>
          </div>
        </div>`;
      }
    }
  } catch(e) {}
  if (TUNEFIND_USER && TUNEFIND_USER !== 'your_tunefind_user') {
    try {
      const creds = btoa(`${TUNEFIND_USER}:${TUNEFIND_PASS}`);
      const r = await fetch(`https://www.tunefind.com/api/v1/${type}/${slug}`, {
        headers: { 'Authorization': `Basic ${creds}` }
      });
      if (r.ok) {
        const d = await r.json();
        const songs = (d.song_instances || []).slice(0, 5);
        if (songs.length) {
          songsHtml = `<div class="xsec-lbl" style="margin-top:10px">🎬 Featured in scenes</div>
            <div class="song-list">${songs.map(s => `<div class="song-row">
              <span class="song-name">${esc(s.song?.name || '')}</span>
              <span class="song-artist">${esc(s.song?.artist?.name || '')}</span>
            </div>`).join('')}</div>
            <a class="xlink" href="https://www.tunefind.com/${type}/${slug}" target="_blank">All songs on TuneFind →</a>`;
        }
      }
    } catch(e) {}
  }
  if (albumHtml || songsHtml) {
    card.querySelector('.music-sec').innerHTML = `<div class="xsec">
      <div class="xsec-lbl">🎵 Soundtrack</div>
      ${albumHtml}${songsHtml}
    </div>`;
  }
}

function loadFashion(item, card) {
  if (item.media_type !== 'tv') return;
  const slug = toSlug(item.name);
  card.querySelector('.fashion-sec').innerHTML = `<div class="xsec">
    <div class="xsec-lbl">👗 Shop the look</div>
    <div class="fashion-links">
      <a class="fashion-btn" href="https://wornontv.net/${slug}/" target="_blank">WornOnTV</a>
      <a class="fashion-btn" href="https://www.shopyourtv.com/${slug}/" target="_blank">ShopYourTV</a>
    </div>
  </div>`;
}

function renderP(section, us, item) {
  if (!us) { section.innerHTML = `<div class="nonefound">Not available for streaming in the US</div>`; return; }
  const groups = [
    { key: 'flatrate', label: 'Included with subscription', dot: 'g' },
    { key: 'free',     label: 'Free with ads',              dot: 'g' },
    { key: 'rent',     label: 'Rent',                       dot: 'y' },
    { key: 'buy',      label: 'Buy',                        dot: 'p' },
  ];
  let html = ''; let any = false;
  groups.forEach(g => {
    const ps = us[g.key]; if (!ps || !ps.length) return; any = true;
    html += `<div class="pgrp"><div class="plbl"><span class="dot ${g.dot}"></span>${g.label}</div>
      <div class="chips">${ps.map(p =>
        `<div class="chip">${p.logo_path ? `<img class="plogo" src="${LB}${p.logo_path}" alt="${esc(p.provider_name)}" loading="lazy">` : ''}${esc(p.provider_name)}</div>`
      ).join('')}</div></div>`;
  });
  if (!any) html = `<div class="nonefound">No streaming options in the US</div>`;
  section.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
